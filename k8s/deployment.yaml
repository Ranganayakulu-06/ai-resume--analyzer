# Kubernetes Deployment for AI Resume Analyzer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-resume-backend
  labels:
    app: ai-resume-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-resume-backend
  template:
    metadata:
      labels:
        app: ai-resume-backend
    spec:
      containers:
      - name: backend
        image: ai-resume-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-resume-secrets
              key: database-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-resume-secrets
              key: openai-api-key
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-resume-backend-service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: ai-resume-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-resume-frontend
  labels:
    app: ai-resume-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-resume-frontend
  template:
    metadata:
      labels:
        app: ai-resume-frontend
    spec:
      containers:
      - name: frontend
        image: ai-resume-frontend:latest
        ports:
        - containerPort: 5173
        env:
        - name: VITE_API_URL
          value: http://ai-resume-backend-service:8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-resume-frontend-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5173
  selector:
    app: ai-resume-frontend
